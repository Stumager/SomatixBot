services:
  db:
    image: postgres:16-alpine
    container_name: tasker_db
    environment:
      POSTGRES_DB: ${DB_NAME:-tasker_db}
      POSTGRES_USER: ${DB_USER:-postgres_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me-local-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: tasker_web
    command: >
      sh -c "cd /app/templates
      && npm ci
      && npm run build
      && cd /app
      && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME:-tasker_db}
      DB_USER: ${DB_USER:-postgres_user}
      DB_PASSWORD: ${DB_PASSWORD:-change-me-local-password}
      DB_PORT: 5432
    depends_on:
      - db


volumes:
  postgres_data:
